    function PipelineDiagram() {
      const [active, setActive] = useState(null);
      const [tick, setTick] = useState(0);
      useEffect(() => { const id = setInterval(() => setTick(t => t+1), 55); return () => clearInterval(id); }, []);
      const nodeById = Object.fromEntries(PIPELINE_NODES.map(n=>[n.id,n]));
      const particles = PIPELINE_EDGES.map((edge,ei) => {
        const a=nodeById[edge[0]], b=nodeById[edge[1]];
        const t=((tick*.45+ei*35)%100)/100;
        return { x:a.x+(b.x-a.x)*t, y:a.y+(b.y-a.y)*t, id:ei };
      });
      return (
        <div style={{ width:"100%", aspectRatio:"3.2/1", position:"relative" }}>
          <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{ width:"100%", height:"100%", overflow:"visible" }}>
            {PIPELINE_EDGES.map(([a,b],i) => {
              const na=nodeById[a], nb=nodeById[b], isActive=active===a||active===b;
              return <line key={i} x1={na.x} y1={na.y} x2={nb.x} y2={nb.y}
                stroke={isActive?"#0052cc":"#cbd5e1"} strokeWidth={isActive?.7:.25}
                strokeDasharray={isActive?"none":"1.2 0.6"} style={{ transition:"all .3s" }} />;
            })}
            {particles.map(p => <circle key={p.id} cx={p.x} cy={p.y} r={.55} fill="#0066ff" opacity={.65} />)}
            {PIPELINE_NODES.map(node => (
              <g key={node.id} style={{ cursor:"pointer" }}
                onMouseEnter={()=>setActive(node.id)} onMouseLeave={()=>setActive(null)}>
                <circle cx={node.x} cy={node.y} r={5.8}
                  fill={active===node.id?node.color:"#f0f4ff"}

    function AnimatedStat({ value, unit, label, sub, delay=0, last=false }) {
      const [visible, setVisible] = useState(false);
      const ref = useRef(null);
      useEffect(() => {
        const obs = new IntersectionObserver(([e])=>{ if(e.isIntersecting) setVisible(true); },{ threshold:.3 });
        if(ref.current) obs.observe(ref.current);
        return () => obs.disconnect();
      },[]);
      return (
        <div ref={ref} className="hero-stat-cell" style={{
          borderRight: last ? "none" : "1px solid #e2e8f0",
          opacity: visible?1:0, transform: visible?"translateY(0)":"translateY(18px)",
          transition: `opacity .65s ${delay}ms, transform .65s ${delay}ms`,
        }}>
          <div style={{ fontFamily:"IBM Plex Mono", fontSize:".58rem", letterSpacing:".22em", color:"#94a3b8", marginBottom:".4rem" }}>{label}</div>

        </div>
      );
    }
