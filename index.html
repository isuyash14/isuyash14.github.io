    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'EB Garamond', Georgia, serif;
      background: #f7f5f0;
    }

    @keyframes marquee {
      from {
        transform: translateX(0);
      }

      to {
        transform: translateX(-100%);
      }
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(28px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulseRing {
      0% {
        transform: scale(1);
        opacity: .9;
      }

      100% {
        transform: scale(2.6);
        opacity: 0;
      }
    }

    @keyframes floatBadge {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-6px);
      }
    }

    .fade-up-0 {
      animation: fadeUp .9s .10s cubic-bezier(.4, 0, .2, 1) both;
    }

    .fade-up-1 {
      animation: fadeUp .9s .25s cubic-bezier(.4, 0, .2, 1) both;
    }

    .fade-up-2 {
      animation: fadeUp .9s .45s cubic-bezier(.4, 0, .2, 1) both;
    }

    .fade-up-3 {
      animation: fadeUp .9s .65s cubic-bezier(.4, 0, .2, 1) both;
    }

    /* ─── NAV ─── */
    .nav-links {
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    /* ─── HERO LAYOUT ─── */
    .hero-inner {
      display: grid;
      grid-template-columns: 58% 42%;
      gap: 3rem;
      align-items: center;
      position: relative;
    }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      background: white;
      border: 1px solid #e2e8f0;
      box-shadow: 0 4px 28px rgba(0, 0, 0, .07);
    }

    .hero-stat-cell {
      padding: 1.5rem 1rem;
      border-right: 1px solid #e2e8f0;
      text-align: center;
    }

    /* ─── PHOTO CARD ─── */
    .photo-card {
      position: relative;
      border-radius: 2px;
      overflow: visible;
    }

    .photo-img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 3/4;
      overflow: hidden;
      border-radius: 2px;
      box-shadow: 0 24px 60px rgba(0, 82, 204, .18), 0 8px 24px rgba(0, 0, 0, .12);
    }

    .photo-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .photo-img-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(160deg, #0c1a3a 0%, #0052cc 60%, #003d99 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    .photo-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(0deg, rgba(8, 12, 20, .92) 0%, transparent 100%);
      padding: 2.5rem 1.5rem 1.5rem;
    }

    .expertise-badge {
      position: absolute;
      font-family: 'IBM Plex Mono', monospace;
      font-size: .58rem;
      font-weight: 600;
      letter-spacing: .12em;
      padding: .35rem .75rem;
      border-radius: 2px;
      white-space: nowrap;
      animation: floatBadge 3s ease-in-out infinite;
    }

    /* ─── AUTOMATION TOOLS ─── */
    .ai-panel-grid {
      display: grid;
      grid-template-columns: 1fr 1.1fr;
      gap: 4rem;
      align-items: start;
    }

    .ai-metrics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: rgba(255, 255, 255, .08);
    }

    .tool-summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: rgba(255, 255, 255, .06);
      margin-top: 3rem;
    }

    /* ─── PIPELINE ─── */
    .pipeline-layout {
      display: grid;
      grid-template-columns: 1fr 2.2fr;
      gap: 4.5rem;
      align-items: start;
    }

      display: grid;
      grid-template-columns: repeat(7, 1fr);
      border: 1px solid #e2e8f0;
    }

    /* ─── PATENTS ─── */

      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    /* ─── EXPERIENCE ─── */
    .exp-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 5rem;

      grid-template-columns: repeat(6, 1fr);

    }

      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #0052cc;
      flex-shrink: 0;
      display: inline-block;
    }

      gap: 0;
      border-left: 1px solid rgba(255, 255, 255, .06);

      gap: 5rem;
      align-items: start;
    }

    /* ─── HOVER ─── */

    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background: #0052cc;
      transition: width .3s;

    .nav-link:hover::after {

    .wh-card {

    .wh-card:hover {

    .wh-card:hover .wh-apps {

    .exp-card {

    }

    .exp-card:hover {
      border-color: #0052cc;
    }

    .skill-col {

    }

    .skill-col:hover {
      background: #f0f4ff !important;
    }

    .cert-chip {

      background: #0052cc !important;

    .cert-chip:hover .cert-name {

    }

    }

    .post-row {
      transition: background .2s;
    }

    .post-row:hover {
      background: rgba(0, 82, 204, .12) !important;
    }

      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: #ff2200;
      animation: pulseRing 1.6s ease-out infinite;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: #f7f5f0;
    }

    ::-webkit-scrollbar-thumb {
      background: #0052cc;
      border-radius: 2px;
    }

      .patents-grid {
        grid-template-columns: 1fr;

      .hero-stats {
        grid-template-columns: repeat(3, 1fr);

    }

      .hero-stat-cell {

      .wh-grid {

      .skills-grid {

      .impact-grid {

      .ai-metrics-grid {

      }

      .tool-summary {
        grid-template-columns: 1fr;

    @media (max-width: 480px) {
      .hero-stats {

      }

      .hero-stat-cell {
        border-right: none;
      }

      .skills-grid {
        grid-template-columns: 1fr 1fr;
      }

      .impact-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    /* ═══════ PIPELINE DIAGRAM ═══════ */
    function PipelineDiagram() {
      const [active, setActive] = useState(null);
      const [tick, setTick] = useState(0);
      useEffect(() => { const id = setInterval(() => setTick(t => t + 1), 55); return () => clearInterval(id); }, []);
      const nodeById = Object.fromEntries(PIPELINE_NODES.map(n => [n.id, n]));
      const particles = PIPELINE_EDGES.map((edge, ei) => {
        const a = nodeById[edge[0]], b = nodeById[edge[1]];
        const t = ((tick * .45 + ei * 35) % 100) / 100;
        return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t, id: ei };
      });
      return (
        <div style={{ width: "100%", aspectRatio: "3.2/1", position: "relative" }}>
          <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{ width: "100%", height: "100%", overflow: "visible" }}>
            {PIPELINE_EDGES.map(([a, b], i) => {
              const na = nodeById[a], nb = nodeById[b], isActive = active === a || active === b;
              return <line key={i} x1={na.x} y1={na.y} x2={nb.x} y2={nb.y}
                stroke={isActive ? "#0052cc" : "#cbd5e1"} strokeWidth={isActive ? .7 : .25}
                strokeDasharray={isActive ? "none" : "1.2 0.6"} style={{ transition: "all .3s" }} />;
            })}
            {particles.map(p => <circle key={p.id} cx={p.x} cy={p.y} r={.55} fill="#0066ff" opacity={.65} />)}
            {PIPELINE_NODES.map(node => (
              <g key={node.id} style={{ cursor: "pointer" }}
                onMouseEnter={() => setActive(node.id)} onMouseLeave={() => setActive(null)}>
                <circle cx={node.x} cy={node.y} r={5.8}
                  fill={active === node.id ? node.color : "#f0f4ff"}
                  stroke={node.color} strokeWidth={.5} style={{ transition: "all .2s" }} />
                <text x={node.x} y={node.y + .9} textAnchor="middle" fontSize="4"
                  fill={active === node.id ? "white" : node.color}
                  style={{ fontFamily: "IBM Plex Mono,monospace", fontWeight: 600, pointerEvents: "none" }}>
                  {node.icon}
                </text>
                <text x={node.x} y={node.y + 9.5} textAnchor="middle" fontSize="2.5" fill="#475569"
                  style={{ fontFamily: "IBM Plex Mono,monospace", pointerEvents: "none" }}>
                  {node.label}
                </text>
              </g>
            ))}
          </svg>
        </div>
      );
    }

    /* ═══════ ANIMATED STAT ═══════ */
    function AnimatedStat({ value, unit, label, sub, delay = 0, last = false }) {
      const [visible, setVisible] = useState(false);
      const ref = useRef(null);
      useEffect(() => {
        const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setVisible(true); }, { threshold: .3 });
        if (ref.current) obs.observe(ref.current);
        return () => obs.disconnect();
      }, []);
      return (
        <div ref={ref} className="hero-stat-cell" style={{
          borderRight: last ? "none" : "1px solid #e2e8f0",
          opacity: visible ? 1 : 0, transform: visible ? "translateY(0)" : "translateY(18px)",
          transition: `opacity .65s ${delay}ms, transform .65s ${delay}ms`,
        }}>
          <div style={{ fontFamily: "IBM Plex Mono", fontSize: ".58rem", letterSpacing: ".22em", color: "#94a3b8", marginBottom: ".4rem" }}>{label}</div>
          <div style={{ fontFamily: "Bebas Neue,Arial Black", fontSize: "clamp(1.8rem,3vw,3.2rem)", lineHeight: 1, color: "#0c0c0c", letterSpacing: ".02em" }}>
            {value}<span style={{ color: "#0052cc" }}>{unit}</span>
          </div>
          <div style={{ fontFamily: "IBM Plex Mono", fontSize: ".58rem", color: "#94a3b8", marginTop: ".3rem" }}>{sub}</div>
        </div>
      );
    }
