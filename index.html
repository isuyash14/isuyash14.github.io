    /* ═══════════════ PIPELINE DIAGRAM ═══════════════ */
    function PipelineDiagram() {
      const [active, setActive] = useState(null);
      const [tick, setTick] = useState(0);
      useEffect(() => {
        const id = setInterval(() => setTick(t => t + 1), 55);
        return () => clearInterval(id);
      }, []);
      const nodeById = Object.fromEntries(PIPELINE_NODES.map(n => [n.id, n]));
      const particles = PIPELINE_EDGES.map((edge, ei) => {
        const a = nodeById[edge[0]], b = nodeById[edge[1]];
        const t = ((tick * 0.45 + ei * 35) % 100) / 100;
        return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t, id: ei };
      });
      return (
        <div style={{ width:"100%", aspectRatio:"3.2/1", position:"relative" }}>
          <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{ width:"100%", height:"100%", overflow:"visible" }}>
            {PIPELINE_EDGES.map(([a,b],i) => {
              const na = nodeById[a], nb = nodeById[b];
              const isActive = active===a || active===b;
              return <line key={i} x1={na.x} y1={na.y} x2={nb.x} y2={nb.y}
                stroke={isActive?"#0052cc":"#cbd5e1"}
                strokeWidth={isActive?0.7:0.25}
                strokeDasharray={isActive?"none":"1.2 0.6"}
                style={{ transition:"all 0.3s" }} />;
            })}
            {particles.map(p => <circle key={p.id} cx={p.x} cy={p.y} r={0.55} fill="#0066ff" opacity={0.65} />)}
            {PIPELINE_NODES.map(node => (
              <g key={node.id} style={{ cursor:"pointer" }}
                onMouseEnter={() => setActive(node.id)}
                onMouseLeave={() => setActive(null)}>
                <circle cx={node.x} cy={node.y} r={5.8}
                  fill={active===node.id?node.color:"#f0f4ff"}
                  stroke={node.color} strokeWidth={0.5}
                  style={{ transition:"all 0.2s" }} />
                <text x={node.x} y={node.y+0.9} textAnchor="middle" fontSize="4"
                  fill={active===node.id?"white":node.color}
                  style={{ fontFamily:"IBM Plex Mono,monospace", fontWeight:600, pointerEvents:"none" }}>
                  {node.icon}
                </text>
                <text x={node.x} y={node.y+9.5} textAnchor="middle" fontSize="2.5" fill="#475569"
                  style={{ fontFamily:"IBM Plex Mono,monospace", pointerEvents:"none" }}>
                  {node.label}
                </text>
              </g>
            ))}
          </svg>
        </div>
      );
    }

    /* ═══════════════ ANIMATED STAT ═══════════════ */
    function AnimatedStat({ value, unit, label, sub, delay=0 }) {
      const [visible, setVisible] = useState(false);
      const ref = useRef(null);
      useEffect(() => {
        const obs = new IntersectionObserver(([e]) => { if(e.isIntersecting) setVisible(true); }, { threshold:0.3 });
        if(ref.current) obs.observe(ref.current);
        return () => obs.disconnect();
      }, []);
      return (
        <div ref={ref} style={{
          padding:"2rem 1.5rem", borderRight:"1px solid #e2e8f0",
          opacity: visible?1:0, transform: visible?"translateY(0)":"translateY(18px)",
          transition: `opacity 0.65s ${delay}ms, transform 0.65s ${delay}ms`,
        }}>
          <div style={{ fontFamily:"IBM Plex Mono", fontSize:"0.58rem", letterSpacing:"0.22em", color:"#94a3b8", marginBottom:"0.4rem" }}>{label}</div>
          <div style={{ fontFamily:"Bebas Neue,Arial Black", fontSize:"clamp(2rem,5vw,3.2rem)", lineHeight:1, color:"#0c0c0c", letterSpacing:"0.02em" }}>
            {value}<span style={{ color:"#0052cc" }}>{unit}</span>
          </div>
          <div style={{ fontFamily:"IBM Plex Mono", fontSize:"0.58rem", color:"#94a3b8", marginTop:"0.3rem" }}>{sub}</div>
        </div>
      );
    }
